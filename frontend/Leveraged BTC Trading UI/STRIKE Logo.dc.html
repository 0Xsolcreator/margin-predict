<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; background: #08080a; }
</style>
</helmet>

<div style="min-height:100vh; width:100%; background:radial-gradient(120% 80% at 50% -5%, #11140c 0%, #08080a 55%); font-family:'Space Grotesk',sans-serif; color:#e9e9e2; padding:64px 56px 88px; display:flex; flex-direction:column; align-items:center">

  <!-- header -->
  <div style="width:100%; max-width:1040px; display:flex; align-items:center; justify-content:space-between; padding-bottom:30px; border-bottom:1px solid rgba(212,245,107,0.16); margin-bottom:76px">
    <div style="font-weight:400; font-size:12px; letter-spacing:4px; color:#7d8a52; text-transform:uppercase">STRIKE · Identity</div>
    <div style="font-weight:300; font-size:13px; letter-spacing:1px; color:#6f7456">an elegant refinement</div>
  </div>

  <!-- PRIMARY LOCKUP -->
  <div style="display:flex; align-items:center; gap:30px; margin-bottom:26px">
    <svg width="86" height="86" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 22px rgba(212,245,107,0.28))">
      <circle cx="50" cy="50" r="37" stroke="#d4f56b" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="50" r="15" stroke="#d4f56b" stroke-width="1.5" opacity="0.45"/>
      <line x1="50" y1="3" x2="50" y2="26" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="50" y1="74" x2="50" y2="97" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="3" y1="50" x2="26" y2="50" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="74" y1="50" x2="97" y2="50" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="6" fill="#d4f56b"/>
    </svg>
    <div style="display:flex; flex-direction:column; gap:8px">
      <div style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:58px; line-height:0.9; letter-spacing:14px; color:#f4f4ef; padding-left:14px">STRIKE</div>
      <div style="font-weight:400; font-size:11px; letter-spacing:7px; color:#7d8a52; text-transform:uppercase; padding-left:16px">Oracle-settled markets</div>
    </div>
  </div>

  <div style="font-weight:300; font-size:11px; letter-spacing:3px; color:#52553f; text-transform:uppercase; margin-bottom:80px">Primary lockup</div>

  <!-- TREATMENTS GRID -->
  <div style="width:100%; max-width:1040px; display:grid; grid-template-columns:repeat(2,1fr); gap:28px">

    <!-- mark alone -->
    <div style="background:linear-gradient(160deg,#121309,#0c0c0a); border:1px solid rgba(212,245,107,0.14); border-radius:14px; padding:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; min-height:240px">
      <svg width="78" height="78" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 16px rgba(212,245,107,0.22))">
        <circle cx="50" cy="50" r="37" stroke="#d4f56b" stroke-width="1.5" opacity="0.5"/>
        <circle cx="50" cy="50" r="15" stroke="#d4f56b" stroke-width="1.5" opacity="0.45"/>
        <line x1="50" y1="3" x2="50" y2="26" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="50" y1="74" x2="50" y2="97" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="3" y1="50" x2="26" y2="50" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="74" y1="50" x2="97" y2="50" stroke="#d4f56b" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="6" fill="#d4f56b"/>
      </svg>
      <span style="font-weight:300; font-size:10px; letter-spacing:3px; color:#6f7456; text-transform:uppercase">Reticle mark</span>
    </div>

    <!-- alt mark: bolt -->
    <div style="background:linear-gradient(160deg,#121309,#0c0c0a); border:1px solid rgba(212,245,107,0.14); border-radius:14px; padding:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; min-height:240px">
      <svg width="78" height="78" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 16px rgba(212,245,107,0.22))">
        <circle cx="50" cy="50" r="37" stroke="#d4f56b" stroke-width="1.5" opacity="0.5"/>
        <path d="M56 20 L34 53 L48 53 L43 80 L67 45 L52 45 Z" fill="#d4f56b"/>
      </svg>
      <span style="font-weight:300; font-size:10px; letter-spacing:3px; color:#6f7456; text-transform:uppercase">Alt · Strike bolt</span>
    </div>

    <!-- wordmark -->
    <div style="background:linear-gradient(160deg,#121309,#0c0c0a); border:1px solid rgba(212,245,107,0.14); border-radius:14px; padding:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; min-height:240px">
      <div style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:40px; letter-spacing:11px; color:#f4f4ef; padding-left:11px">STRIKE</div>
      <span style="font-weight:300; font-size:10px; letter-spacing:3px; color:#6f7456; text-transform:uppercase">Wordmark</span>
    </div>

    <!-- on light -->
    <div style="background:linear-gradient(160deg,#eef0e4,#dfe3cd); border:1px solid rgba(0,0,0,0.06); border-radius:14px; padding:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; min-height:240px">
      <div style="display:flex; align-items:center; gap:18px">
        <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="37" stroke="#4a5a1e" stroke-width="1.8" opacity="0.5"/>
          <circle cx="50" cy="50" r="15" stroke="#4a5a1e" stroke-width="1.8" opacity="0.45"/>
          <line x1="50" y1="3" x2="50" y2="26" stroke="#4a5a1e" stroke-width="2.6" stroke-linecap="round"/>
          <line x1="50" y1="74" x2="50" y2="97" stroke="#4a5a1e" stroke-width="2.6" stroke-linecap="round"/>
          <line x1="3" y1="50" x2="26" y2="50" stroke="#4a5a1e" stroke-width="2.6" stroke-linecap="round"/>
          <line x1="74" y1="50" x2="97" y2="50" stroke="#4a5a1e" stroke-width="2.6" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="6" fill="#4a5a1e"/>
        </svg>
        <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:32px; letter-spacing:8px; color:#2a2c20; padding-left:8px">STRIKE</div>
      </div>
      <span style="font-weight:400; font-size:10px; letter-spacing:3px; color:#7d8a52; text-transform:uppercase">On light</span>
    </div>

  </div>

  <!-- comparison: before / after -->
  <div style="width:100%; max-width:1040px; display:flex; gap:28px; margin-top:28px">
    <div style="flex:1; background:linear-gradient(160deg,#121309,#0c0c0a); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:30px 36px; display:flex; flex-direction:column; align-items:center; gap:20px">
      <div style="display:flex; align-items:center; gap:11px">
        <div style="width:26px; height:26px; border:1.5px solid #d4f56b; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0"><div style="width:8px; height:8px; background:#d4f56b; border-radius:50%"></div></div>
        <span style="font-family:'Pixelify Sans',sans-serif; font-weight:700; font-size:20px; color:#f4f4ef; letter-spacing:2px">STRIKE</span>
      </div>
      <span style="font-weight:300; font-size:10px; letter-spacing:3px; color:#52553f; text-transform:uppercase">Before · arcade</span>
    </div>
    <div style="flex:1; background:linear-gradient(160deg,#141707,#0c0c0a); border:1px solid rgba(212,245,107,0.2); border-radius:14px; padding:30px 36px; display:flex; flex-direction:column; align-items:center; gap:20px">
      <div style="display:flex; align-items:center; gap:14px">
        <svg width="30" height="30" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="37" stroke="#d4f56b" stroke-width="2.2" opacity="0.5"/>
          <line x1="50" y1="3" x2="50" y2="26" stroke="#d4f56b" stroke-width="3" stroke-linecap="round"/>
          <line x1="50" y1="74" x2="50" y2="97" stroke="#d4f56b" stroke-width="3" stroke-linecap="round"/>
          <line x1="3" y1="50" x2="26" y2="50" stroke="#d4f56b" stroke-width="3" stroke-linecap="round"/>
          <line x1="74" y1="50" x2="97" y2="50" stroke="#d4f56b" stroke-width="3" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="7" fill="#d4f56b"/>
        </svg>
        <span style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:21px; color:#f4f4ef; letter-spacing:5px; padding-left:5px">STRIKE</span>
      </div>
      <span style="font-weight:300; font-size:10px; letter-spacing:3px; color:#7d8a52; text-transform:uppercase">After · refined</span>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
